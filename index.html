<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DocChat – RAG Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════ HEADER ════════════════ -->
<header>
    <div class="logo">Doc<span>Chat</span></div>
    <div class="hdiv"></div>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Zmień motyw">
        <svg id="themeIcon" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>
    <div class="hdiv"></div>
    <span id="providerBadge" class="badge badge-anthropic">Anthropic</span>

    <div class="api-area">
        <select class="provider-sel" id="providerSel" onchange="onProviderChange()">
            <option value="anthropic">Anthropic Claude</option>
            <option value="google">Google Gemini</option>
            <option value="openai">OpenAI GPT</option>
        </select>

        <select class="model-sel" id="modelSel"></select>

        <div class="key-dot" id="keyDot"></div>

        <div class="key-wrapper">
            <input type="password" id="keyInput" class="key-input" placeholder="sk-ant-api03-…" autocomplete="off">
            <button class="eye-btn" onclick="toggleKey()" title="Pokaż / ukryj klucz">
                <svg id="eyeIcon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
            </button>
        </div>

        <button class="btn btn-primary" onclick="saveKey()">Zapisz klucz</button>
    </div>
</header>

<!-- ════════════════ MAIN ════════════════ -->
<main>
    <aside>
        <div class="sidebar-title">Dokumenty PDF</div>

        <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
            <div class="uz-icon">
                <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                    <polyline points="14 2 14 8 20 8"/>
                    <line x1="12" y1="18" x2="12" y2="12"/>
                    <line x1="9"  y1="15" x2="15" y2="15"/>
                </svg>
            </div>
            <p>Przeciągnij pliki PDF tutaj<br>lub <strong>kliknij, aby wybrać</strong></p>
        </div>
        <input type="file" id="fileInput" accept=".pdf" multiple>

        <div class="progress-wrap" id="progressWrap">
            <div class="progress-label">
                <span id="progressTxt">Przetwarzanie…</span>
                <span id="progressPct">0%</span>
            </div>
            <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <div class="file-list" id="fileList">
            <div class="file-empty" id="fileEmpty">Brak wgranych dokumentów</div>
        </div>

        <div class="sidebar-foot">
            <button class="btn btn-danger" style="width:100%" onclick="clearDocs()">Wyczyść dokumenty</button>
        </div>
    </aside>

    <section class="chat-area">
        <div class="chat-messages" id="chatMessages">
            <div class="chat-empty-state" id="emptyState">
                <svg width="50" height="50" fill="none" stroke="currentColor" stroke-width="1.3" viewBox="0 0 24 24">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
                <h3>Witaj w DocChat</h3>
                <p>Wybierz providera, zapisz klucz API, wgraj PDF-y i zacznij zadawać pytania.</p>
            </div>
        </div>

        <div class="chat-footer">
            <div class="token-counter" id="tokenCounter">Kontekst: 0 est. tokenów</div>
            <div class="input-row">
                <textarea id="chatInput" class="chat-input" rows="1"
                    placeholder="Zadaj pytanie dotyczące dokumentów…" disabled></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
                    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                    Wyślij
                </button>
            </div>
        </div>
    </section>
</main>

<!-- ════════════════ PDF PREVIEW MODAL ════════════════ -->
<div class="modal-overlay hidden" id="previewModal" onclick="onModalOverlayClick(event)">
    <div class="modal-box">
        <div class="modal-header">
            <span class="modal-title" id="previewTitle"></span>
            <div class="modal-nav">
                <button id="prevBtn" onclick="previewPrevPage()" title="Poprzednia strona">&#8249;</button>
                <span class="modal-page-info" id="pageInfo">1 / 1</span>
                <button id="nextBtn" onclick="previewNextPage()" title="Następna strona">&#8250;</button>
            </div>
            <button class="modal-close" onclick="closePreview()" title="Zamknij">&#10005;</button>
        </div>
        <div class="modal-body" id="modalBody">
            <div class="modal-spinner" id="modalSpinner">
                <div class="spinner"></div> Ładowanie…
            </div>
        </div>
    </div>
</div>

<div id="toasts"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="app.js"></script>
</body>
</html>
